Get Lite Information:
  ai_description: |
    ### General Description
    Enriches IP Address entities with lightweight geolocation and ASN data using the IPinfo Lite API. Returns country, country code, continent, continent code, ASN, AS name and AS domain. Best suited for high-volume use cases where city-level accuracy is not required.

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager from integration configuration.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/lite/{ip}`.
    4. Flatten the JSON response, prefix keys with `IPInfo`, and attach as enrichment.
    5. Add a CSV data table to each entity and mark it enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Lite information and adds CSV data tables.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_entity_type: true
Get Core Information:
  ai_description: |
    ### General Description
    Enriches IP Address entities with city-level geolocation, ASN information, and classification flags (anycast, hosting, mobile, satellite) using the IPinfo Core API.

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/lookup/{ip}`.
    4. Flatten the response into `geo.*`, `as.*`, and top-level classification flags.
    5. Update entity properties, add CSV data table, mark enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Core information including city, region, country, coordinates, timezone, postal code, ASN details, and classification flags.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_entity_type: true
Get Plus Information:
  ai_description: |
    ### General Description
    Enriches IP Address entities with Plus-tier intelligence: everything in Core, plus mobile carrier data (name, MCC, MNC) and anonymity detection (VPN, proxy, Tor, relay).

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/plus/{ip}`.
    4. Flatten `geo.*`, `as.*`, `mobile.*`, `anonymous.*`, and classification flags.
    5. Update entity properties, add CSV data table, mark enriched.

    ### Additional Notes
    Use this action when threat investigation needs to distinguish VPN/Tor traffic or to identify mobile-network origins.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
