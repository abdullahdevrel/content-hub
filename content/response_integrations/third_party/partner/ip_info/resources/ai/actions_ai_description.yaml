    filters_by_entity_type: true
Get ASN Information:
  ai_description: |
    ### General Description
    Returns detailed information about an Autonomous System Number, including allocated prefixes, country, registry, related domain, AS type, peers, upstreams, and downstreams.

    ### Parameters Description
    - **ASN** (required, string): The ASN to look up. Accepts `AS15169`, `as15169`, or `15169`.

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Validate and normalise the ASN parameter.
    3. Call `/AS{asn}`.
    4. Add the response as a JSON result and a CSV data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
    entity_types: []
    filters_by_entity_type: false
Get Domain Information:
  ai_description: |
    ### General Description
    Returns the domains hosted on an IP address using the IPinfo Hosted Domains (reverse-IP) API. The response includes the total number of domains and a paginated list.

    ### Parameters Description
    - **Page** (optional, integer): Page number, starts at 0. Use to paginate large result sets.
    - **Limit** (optional, integer): Number of domains per page. Range 1-1000, default 100.

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/domains/{ip}` with the optional pagination parameters.
    4. Flatten the response into entity properties.

    ### Additional Notes
    The action name is kept as "Get Domain Information" for playbook compatibility with earlier versions of the integration. Behaviourally it is a reverse-IP lookup.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with the list of domains hosted on the IP and pagination metadata.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_entity_type: true
