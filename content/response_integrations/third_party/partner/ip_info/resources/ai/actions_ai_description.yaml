    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Plus information, including mobile carrier data and anonymity signals.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_entity_type: true
Get Max Information:
  ai_description: |
    ### General Description
    Enriches IP Address entities with the full IPinfo intelligence set: Plus features plus residential proxy detection, last-seen and percent-days-seen activity metrics, and a consolidated `is_anonymous` signal.

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/max/{ip}`.
    4. Flatten the comprehensive payload including `anonymous.is_res_proxy`, `anonymous.last_seen`, and `anonymous.percent_days_seen`.
    5. Update entity properties, add CSV data table, mark enriched.

    ### Additional Notes
    Recommended for advanced threat analysis, fraud prevention, and bot detection.
