Get Privacy Extended Information:
  ai_description: |
    ### General Description
    Returns Privacy Detection Extended signals for an IP address. In addition to the standard VPN/proxy/Tor/relay/hosting flags, the response includes detection methodology metadata (`confidence`, `coverage`, `census`, `device_activity`, `inferred`, `vpn_config`, `whois`) and observation timestamps (`first_seen`, `last_seen`).

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/{ip}/privacy_extended`.
    4. Flatten the response and enrich each entity.

    ### Additional Notes
    Use the `confidence` and `coverage` fields to support risk-scoring decisions.
  capabilities:
