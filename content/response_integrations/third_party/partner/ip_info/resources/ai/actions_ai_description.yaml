    ### General Description
    [Backwards compatibility] Enriches IP Address entities with IP information. In v8.0 and later this action calls the IPinfo Core API (`/lookup/{ip}`). For new playbooks, prefer `Get Lite Information`, `Get Core Information`, `Get Plus Information`, or `Get Max Information` explicitly so the tier and cost profile are clear.

