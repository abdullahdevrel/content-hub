    filters_by_entity_type: true
Get Residential Proxy Information:
  ai_description: |
    ### General Description
    Returns Residential Proxy Detection information for an IP address. The response identifies the proxy service name (suffixed with `_mobile` for carrier/mobile proxies or `_datacenter` for datacenter proxies), the last date the IP was active as a residential proxy, and the percentage of days the IP was active in a 7-day window.

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager.
    2. Filter target entities to type ADDRESS.
    3. For each IP, call `/{ip}/resproxy`.
    4. Flatten the response and enrich each entity.
