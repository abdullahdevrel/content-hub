Ping:
  ai_description: |
    ### General Description
    Verifies connectivity and API token validity by calling the IPinfo `/me` endpoint. Returns 'Connection Established.' on success.

    ### Parameters Description
    There are no action-specific parameters. The action uses the integration configuration (API Root, Token, Verify SSL).

    ### Flow Description
    1. Initialise the IPinfo manager from integration configuration.
    2. Call `/me` to validate the token.
    3. Return success if the call succeeds.
